name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  dotnet:
    name: .NET — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Outlet.Cloud.slnx

      - name: Build (Release, 0 warning)
        run: dotnet build Outlet.Cloud.slnx -c Release --no-restore

      # Lane PR : hermétique, rapide, sans secret. Les tests "Live" (providers
      # réels) appartiennent à une lane planifiée non bloquante, hors de ce repo.
      - name: Test
        run: dotnet test Outlet.Cloud.slnx -c Release --no-build --filter "Category!=Live"
