name: Publish private registry

# Authoring (this repo) -> Distribution (Outlet Cloud). On every push to the default
# branch that touches the registry, regenerate dist/, fail if the committed git-raw
# bootstrap source is stale, then push every item to the Cloud ingestion API.
on:
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'tools/registry/**'
      - '.github/workflows/publish-registry.yml'
  pull_request:
    paths:
      - 'registry/**'
      - 'tools/registry/**'
      - '.github/workflows/publish-registry.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate & build dist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # jq + curl are preinstalled on ubuntu-latest.
      - name: Build dist/registry
        run: ./tools/registry/publish.sh build

      - name: Fail if committed dist/ is stale
        run: |
          git add -AN dist   # intent-to-add so brand-new files surface in the diff
          if ! git diff --exit-code -- dist; then
            echo "::error::dist/ is out of date. Run 'tools/registry/publish.sh build' and commit the result." >&2
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: registry-dist
          path: dist/registry

  publish:
    name: Publish to Outlet Cloud
    needs: validate
    # Never publish from pull requests (no secrets, untrusted code).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish registry items
        env:
          OUTLET_CLOUD_URL: ${{ secrets.OUTLET_CLOUD_URL }}
          OUTLET_CLOUD_EMAIL: ${{ secrets.OUTLET_CLOUD_EMAIL }}
          OUTLET_CLOUD_PASSWORD: ${{ secrets.OUTLET_CLOUD_PASSWORD }}
          OUTLET_ORG_SLUG: ${{ secrets.OUTLET_ORG_SLUG }}
        run: ./tools/registry/publish.sh publish
